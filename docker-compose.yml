# PhishLab — dev/standalone stack. On the SOC external PC this runs behind the dedicated
# detonation router. Later phases add the frontend + a persistent volume for cases/screenshots.
services:
  phishlab:
    build: .
    container_name: phishlab
    environment:
      - PHISH_HEADFUL=0
      # - PHISH_STEALTH=1        # opt-in invisible_playwright real-fingerprint Firefox
    volumes:
      - ./backend:/app
      - phishlab_data:/app/data
    # Detonation is heavy (a real browser); give it headroom.
    mem_limit: 2g
    ports:
      - "127.0.0.1:8090:8090"     # GUI + API at http://localhost:8090 (loopback only, unauthenticated)

volumes:
  phishlab_data:
